<div class="toast-stack">
  @for (t of toastSrv.toasts$ | async; track t.id) {
    <div class="alert alert-{{ t.type }} shadow-sm d-flex justify-content-between align-items-start mb-0" role="alert">
      <span>{{ t.text }}</span>
      <button type="button" class="btn-close ms-3" aria-label="Chiudi" (click)="toastSrv.dismiss(t.id)"></button>
    </div>
  }
</div>
