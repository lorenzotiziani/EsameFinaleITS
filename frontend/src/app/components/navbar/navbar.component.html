<nav class="navbar navbar-expand-lg app-navbar" data-bs-theme="dark">
  <div class="container-fluid">
    <a class="navbar-brand" routerLink="/" (click)="closeMenu()">Academy</a>

    <button class="navbar-toggler"
            type="button"
            (click)="toggleMenu()"
            aria-label="Apri/chiudi menu di navigazione">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="navbar-collapse collapse" [class.show]="isMenuOpen">
      <ul class="navbar-nav ms-auto align-items-lg-center">
        @if (authSrv.currentUser$ | async; as user) {
          <li class="nav-item">
            <a class="nav-link"
               routerLink="/"
               routerLinkActive="active"
               [routerLinkActiveOptions]="{ exact: true }"
               (click)="closeMenu()">Home</a>
          </li>

          <!-- Dipendente -->
          <li class="nav-item" *ifRole="'DIPENDENTE'">
            <a class="nav-link" routerLink="/miei-corsi" routerLinkActive="active" (click)="closeMenu()">I miei corsi</a>
          </li>

          <!-- Referente Academy -->
          <li class="nav-item" *ifRole="'REFERENTE_ACADEMY'">
            <a class="nav-link" routerLink="/corsi" routerLinkActive="active" (click)="closeMenu()">Catalogo</a>
          </li>
          <li class="nav-item" *ifRole="'REFERENTE_ACADEMY'">
            <a class="nav-link" routerLink="/assegnazioni-corsi" routerLinkActive="active" (click)="closeMenu()">Assegnazioni</a>
          </li>
          <li class="nav-item" *ifRole="'REFERENTE_ACADEMY'">
            <a class="nav-link" routerLink="/dipendenti" routerLinkActive="active" (click)="closeMenu()">Dipendenti</a>
          </li>
          <li class="nav-item" *ifRole="'REFERENTE_ACADEMY'">
            <a class="nav-link" routerLink="/statistiche" routerLinkActive="active" (click)="closeMenu()">Statistiche</a>
          </li>

          <li class="nav-item">
            <span class="nav-link user-email">{{ user.nome }} {{ user.cognome }}</span>
          </li>
          <li class="nav-item">
            <button class="btn btn-logout btn-sm ms-lg-2" (click)="logout()">Logout</button>
          </li>
        } @else {
          <li class="nav-item">
            <a class="nav-link"
               routerLink="/login"
               routerLinkActive="active"
               (click)="closeMenu()">Login</a>
          </li>
          <li class="nav-item">
            <a class="nav-link"
               routerLink="/register"
               routerLinkActive="active"
               (click)="closeMenu()">Registrati</a>
          </li>
        }
      </ul>
    </div>
  </div>
</nav>
